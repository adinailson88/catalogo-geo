<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <meta http-equiv="refresh" content="0; url=https://sites.google.com/cja.ufsb.edu.br/catalogogeo/cat%C3%A1logo-de-bases-geoespaciais">
  <link rel="canonical" href="https://sites.google.com/cja.ufsb.edu.br/catalogogeo/cat%C3%A1logo-de-bases-geoespaciais">
  <title>Redirecionando para o Catálogo Geo</title>
  <style>
    :root {
      --cor-fundo: #f4f7fb;
      --cor-card: #ffffff;
      --cor-primaria: #17324d;
      --cor-secundaria: #2563eb;
      --cor-texto: #1f2937;
      --cor-suave: #5b6678;
      --cor-borda: #d9e2ec;
      --sombra: 0 8px 20px rgba(15, 23, 42, 0.06);
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--cor-fundo);
      color: var(--cor-texto);
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 42px 16px;
    }

    .topo {
      background: linear-gradient(135deg, #17324d, #1d4ed8);
      color: white;
      padding: 26px;
      border-radius: 18px;
      margin-bottom: 18px;
      box-shadow: var(--sombra);
    }

    .topo h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.2;
    }

    .topo p {
      margin: 0;
      font-size: 15px;
      line-height: 1.55;
      color: #e5edf8;
    }

    .painel {
      background: var(--cor-card);
      border: 1px solid var(--cor-borda);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--sombra);
    }

    .btn {
      display: inline-block;
      margin-top: 12px;
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 13px;
      font-size: 13px;
      font-weight: 700;
      background: var(--cor-secundaria);
      color: white;
    }

    .repo {
      color: var(--cor-suave);
      font-size: 13px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="topo">
      <h1>Catálogo de Bases e Ferramentas Geoespaciais</h1>
      <p>Redirecionando para o site oficial do catálogo.</p>
    </section>

    <section class="painel">
      <p>Se o redirecionamento não ocorrer automaticamente, acesse o catálogo pelo botão abaixo.</p>
      <a class="btn" href="https://sites.google.com/cja.ufsb.edu.br/catalogogeo/cat%C3%A1logo-de-bases-geoespaciais">Acessar catálogo</a>
      <p class="repo">Este repositório mantém o registro dos scripts utilizados no Apps Script.</p>
    </section>
  </main>
</body>
</html>
